<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Víctorem Impulsa | Gestión Cloud Optimizada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --warning: #fbbf24;
            --success: #10b981;
            --bg: #070E1C;
            --card: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at top, #111827, var(--bg));
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        h1 { color: var(--primary); margin: 0; font-size: 1.6rem; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-main:active { transform: scale(0.98); }

        .header-lista {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 5px;
            font-size: 0.9rem;
        }

        .alumno-item {
            background: var(--card);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .alumno-info b { display: block; text-transform: uppercase; font-size: 0.9rem; color: #fff; }
        .alumno-info span { font-size: 0.75rem; opacity: 0.6; }

        .actions { display: flex; gap: 8px; }
        .btn-icon { padding: 8px; border-radius: 8px; border: none; cursor: pointer; color: white; transition: 0.2s; }
        .btn-edit { background: var(--warning); color: #000; }
        .btn-delete { background: var(--danger); }

        #status-msg { font-size: 0.8rem; color: var(--success); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>VÍCTOREM IMPULSA</h1>
        <p style="opacity:0.5; font-size:0.7rem; margin-bottom:15px;">SISTEMA DE MATRÍCULA CLOUD v2.0</p>
        
        <input type="text" id="nombre" placeholder="Nombre del Alumno">
        <input type="text" id="dni" placeholder="DNI">
        
        <button class="btn-main" id="btnGuardar" onclick="enviarDatos()">
            <i class="fas fa-save"></i> GUARDAR REGISTRO
        </button>

        <div class="header-lista">
            <span id="status-msg">Sincronizado</span>
            <i class="fas fa-sync-alt" id="sync-icon" onclick="consultarAlumnos()" style="cursor:pointer; color: var(--primary);"></i>
        </div>
    </div>

    <div id="listaAlumnos">
        </div>
</div>

<script>
    // 1. TU URL DE GOOGLE (Asegúrate que sea la última versión implementada)
    const MI_URL = "https://script.google.com/macros/s/AKfycbzScMRkhAPZ5zSSuF98OsjHfj2OFSV_ddcemvy4fcCWbEqFwZStEHkPxkPQ3wrCuljc/exec";

    // CARGA INICIAL: Usar memoria local para que sea instantáneo
    window.onload = () => {
        const cache = localStorage.getItem('victorem_data');
        if (cache) {
            renderizarLista(JSON.parse(cache));
        }
        consultarAlumnos(); // Luego busca datos frescos en segundo plano
    };

    async function enviarDatos() {
        const nom = document.getElementById('nombre').value;
        const dni = document.getElementById('dni').value;
        if(!nom || !dni) return alert("Completa los datos");

        setLoading(true, "Guardando...");

        try {
            await fetch(MI_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nombre: nom, dni: dni })
            });
            document.getElementById('nombre').value = "";
            document.getElementById('dni').value = "";
            // Pequeña pausa para que Google procese y recargamos
            setTimeout(consultarAlumnos, 1500);
        } catch (e) {
            alert("Error de conexión");
            setLoading(false);
        }
    }

    async function consultarAlumnos() {
        const icon = document.getElementById('sync-icon');
        const msg = document.getElementById('status-msg');
        icon.classList.add('loading-spin');
        msg.innerText = "Actualizando...";

        try {
            const res = await fetch(MI_URL + "?t=" + new Date().getTime());
            const datos = await res.json();
            
            // Guardar en memoria para la próxima vez
            localStorage.setItem('victorem_data', JSON.stringify(datos));
            renderizarLista(datos);
            
            msg.innerText = "Sincronizado";
        } catch (e) {
            msg.innerText = "Modo Offline";
        } finally {
            icon.classList.remove('loading-spin');
            setLoading(false);
        }
    }

    function renderizarLista(datos) {
        const contenedor = document.getElementById('listaAlumnos');
        contenedor.innerHTML = "";
        
        // OPTIMIZACIÓN: Solo mostramos los últimos 50 para no colapsar el celular
        // El resto sigue en el Excel por seguridad.
        datos.reverse().slice(0, 50).forEach(a => {
            contenedor.innerHTML += `
                <div class="alumno-item">
                    <div class="alumno-info">
                        <b>${a.nombre}</b>
                        <span>DNI: ${a.dni}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-icon btn-edit" onclick="editarAlumno('${a.nombre}', '${a.dni}')"><i class="fas fa-pen"></i></button>
                        <button class="btn-icon btn-delete" onclick="eliminarAlumno('${a.dni}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
        });
    }

    async function eliminarAlumno(dni) {
        if(!confirm("¿Eliminar registro?")) return;
        setLoading(true, "Borrando...");
        await fetch(MI_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", dni: dni }) });
        setTimeout(consultarAlumnos, 1000);
    }

    async function editarAlumno(n, d) {
        const nuevoN = prompt("Nuevo nombre:", n);
        const nuevoD = prompt("Nuevo DNI:", d);
        if(nuevoN && nuevoD) {
            setLoading(true, "Editando...");
            await fetch(MI_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "edit", dniAntiguo: d, nombreNuevo: nuevoN, dniNuevo: nuevoD }) });
            setTimeout(consultarAlumnos, 1000);
        }
    }

    function setLoading(estado, texto = "Guardar Registro") {
        const btn = document.getElementById('btnGuardar');
        const msg = document.getElementById('status-msg');
        btn.disabled = estado;
        btn.innerHTML = estado ? `<i class="fas fa-spinner loading-spin"></i> ${texto}` : `<i class="fas fa-save"></i> GUARDAR REGISTRO`;
        if(estado) msg.innerText = texto;
    }
</script>

</body>
</html>
