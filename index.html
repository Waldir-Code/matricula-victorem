<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte IT | Víctorem Impulsa Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --warning: #fbbf24;
            --success: #10b981;
            --bg: #070E1C;
            --card: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at top, #111827, var(--bg));
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); margin: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .subtitle { opacity: 0.6; font-size: 0.8rem; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        .btn-main {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-main:hover { background: #2563eb; transform: translateY(-2px); }

        .refresh-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        #listaAlumnos { width: 100%; }

        .alumno-item {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
            transition: 0.3s;
        }

        .alumno-item:hover { background: rgba(255,255,255,0.1); }

        .alumno-info b { display: block; text-transform: uppercase; font-size: 0.95rem; }
        .alumno-info span { font-size: 0.8rem; opacity: 0.6; }

        .actions { display: flex; gap: 8px; }

        .btn-icon {
            padding: 8px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn-edit { background: var(--warning); color: #000; }
        .btn-delete { background: var(--danger); }
        .btn-icon:hover { opacity: 0.8; transform: scale(1.1); }

        #msg { color: var(--success); font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

        /* Loader */
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>VÍCTOREM IMPULSA</h1>
        <p class="subtitle">IT DEPT - GESTIÓN DE MATRÍCULAS</p>
        
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="dni" placeholder="Documento DNI">
        
        <button class="btn-main" onclick="enviarDatos()">
            <i class="fas fa-save"></i> GUARDAR REGISTRO
        </button>

        <div class="refresh-area">
            <span id="msg">Sistema listo</span>
            <i class="fas fa-sync-alt" onclick="consultarAlumnos()" style="cursor:pointer; color: var(--primary);"></i>
        </div>
    </div>

    <div id="listaAlumnos">
        </div>
</div>

<script>
    // 1. REEMPLAZA ESTA URL CON TU URL DE APP WEB (LA QUE TERMINA EN /exec)
    const MI_URL = "https://script.google.com/macros/s/AKfycbzScMRkhAPZ5zSSuF98OsjHfj2OFSV_ddcemvy4fcCWbEqFwZStEHkPxkPQ3wrCuIjc/exec";

    // GUARDAR O EDITAR (Soporta ambas acciones)
    async function enviarDatos() {
        const nom = document.getElementById('nombre').value;
        const dni = document.getElementById('dni').value;
        const msg = document.getElementById('msg');

        if(!nom || !dni) return alert("Llena los campos");

        msg.innerHTML = '<i class="fas fa-spinner spinner"></i> Procesando...';

        try {
            await fetch(MI_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nombre: nom, dni: dni })
            });

            msg.innerText = "✅ Registro exitoso";
            document.getElementById('nombre').value = "";
            document.getElementById('dni').value = "";
            setTimeout(consultarAlumnos, 1500);
        } catch (e) {
            msg.innerText = "❌ Error de conexión";
        }
    }

    // ELIMINAR
    async function eliminarAlumno(dni) {
        if(!confirm("¿Deseas eliminar a este alumno de la base de datos?")) return;
        
        const msg = document.getElementById('msg');
        msg.innerText = "Eliminando...";

        try {
            await fetch(MI_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "delete", dni: dni })
            });
            setTimeout(consultarAlumnos, 1000);
            msg.innerText = "✅ Registro borrado";
        } catch (e) { alert("Error al eliminar"); }
    }

    // EDITAR (Usa el mismo doPost con acción "edit")
    async function editarAlumno(nombreActual, dniActual) {
        const nuevoNombre = prompt("Modificar Nombre:", nombreActual);
        const nuevoDni = prompt("Modificar DNI:", dniActual);

        if (nuevoNombre && nuevoDni) {
            const msg = document.getElementById('msg');
            msg.innerText = "Actualizando...";

            try {
                await fetch(MI_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        action: "edit", 
                        dniAntiguo: dniActual, 
                        nombreNuevo: nuevoNombre, 
                        dniNuevo: nuevoDni 
                    })
                });
                setTimeout(consultarAlumnos, 1000);
                msg.innerText = "✅ Datos actualizados";
            } catch (e) { alert("Error al editar"); }
        }
    }

    // VISUALIZAR LISTA
    async function consultarAlumnos() {
        const contenedor = document.getElementById('listaAlumnos');
        contenedor.innerHTML = '<p style="text-align:center; opacity:0.5;">Sincronizando con Cloud...</p>';

        try {
            const res = await fetch(MI_URL + "?t=" + new Date().getTime());
            const datos = await res.json();
            contenedor.innerHTML = "";

            if(datos.length === 0) {
                contenedor.innerHTML = '<p style="text-align:center; opacity:0.3;">No hay registros en el Sheet.</p>';
                return;
            }

            datos.reverse().forEach(a => {
                contenedor.innerHTML += `
                    <div class="alumno-item">
                        <div class="alumno-info">
                            <b>${a.nombre}</b>
                            <span><i class="far fa-id-card"></i> DNI: ${a.dni}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-icon btn-edit" onclick="editarAlumno('${a.nombre}', '${a.dni}')">
                                <i class="fas fa-pencil-alt"></i>
                            </button>
                            <button class="btn-icon btn-delete" onclick="eliminarAlumno('${a.dni}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>`;
            });
        } catch (e) {
            contenedor.innerHTML = '<p style="color:var(--danger); text-align:center;">Error de sincronización</p>';
        }
    }

    // Carga inicial
    window.onload = consultarAlumnos;
</script>

</body>
</html>
