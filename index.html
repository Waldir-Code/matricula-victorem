<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Víctorem Impulsa | Gestión Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3b82f6; --danger: #ef4444; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #334155; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #lista { width: 100%; max-width: 450px; margin-top: 20px; }
        .alumno { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: var(--danger); width: auto; padding: 5px 10px; font-size: 0.8rem; margin-left: 5px; }
        .btn-edit { background: #eab308; width: auto; padding: 5px 10px; font-size: 0.8rem; }
        .acciones { display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align:center; color:var(--primary)">VÍCTOREM IMPULSA</h2>
        <input type="hidden" id="key"> <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="dni" placeholder="DNI">
        <button id="btn-accion" onclick="guardar()">REGISTRAR ALUMNO</button>
    </div>

    <div id="lista"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKWiAnPmIenRrPM8gm-i0bs4SPlWtrmSk",
            authDomain: "victorem-cloud.firebaseapp.com",
            projectId: "victorem-cloud",
            storageBucket: "victorem-cloud.firebasestorage.app",
            messagingSenderId: "256853253245",
            appId: "1:256853253245:web:30e4d2e0b861fea59c6514",
            databaseURL: "https://victorem-cloud-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // GUARDAR O ACTUALIZAR
        function guardar() {
            const nom = document.getElementById('nombre').value;
            const d = document.getElementById('dni').value;
            const key = document.getElementById('key').value;

            if(!nom || !d) return alert("Llena los campos");

            if(key) {
                // Si hay una key, ACTUALIZAMOS
                db.ref('alumnos/' + key).update({ nombre: nom, dni: d });
                resetForm();
            } else {
                // Si no hay key, CREAMOS NUEVO
                db.ref('alumnos/').push({ nombre: nom, dni: d });
                resetForm();
            }
        }

        // ELIMINAR
        function eliminar(key) {
            if(confirm("¿Seguro que quieres eliminar este registro?")) {
                db.ref('alumnos/' + key).remove();
            }
        }

        // PREPARAR EDICIÓN
        function prepararEdicion(key, nombre, dni) {
            document.getElementById('nombre').value = nombre;
            document.getElementById('dni').value = dni;
            document.getElementById('key').value = key;
            document.getElementById('btn-accion').innerText = "ACTUALIZAR DATOS";
            document.getElementById('btn-accion').style.background = "#eab308";
        }

        function resetForm() {
            document.getElementById('nombre').value = "";
            document.getElementById('dni').value = "";
            document.getElementById('key').value = "";
            document.getElementById('btn-accion').innerText = "REGISTRAR ALUMNO";
            document.getElementById('btn-accion').style.background = "#3b82f6";
        }

        // ESCUCHAR EN TIEMPO REAL
        db.ref('alumnos/').on('value', (snapshot) => {
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = "";
            snapshot.forEach((hijo) => {
                const data = hijo.val();
                const id = hijo.key; // Esta es la "llave" única de Firebase
                contenedor.innerHTML += `
                    <div class="alumno">
                        <div>
                            <b>${data.nombre}</b>
                            <small>DNI: ${data.dni}</small>
                        </div>
                        <div class="acciones">
                            <button class="btn-edit" onclick="prepararEdicion('${id}', '${data.nombre}', '${data.dni}')">Editar</button>
                            <button class="btn-delete" onclick="eliminar('${id}')">Borrar</button>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
